<script>
const tripStart = new Date("2026-07-09");
const tripEnd = new Date("2026-07-16");

function updateCountdown() {
  const now = new Date();
  const diff = Math.ceil((tripStart - now) / (1000*60*60*24));

  document.getElementById("countdown").innerText =
    diff > 0
      ? `⏳ Do wyjazdu: ${diff} dni`
      : `🌴 Jesteś na Azorach!`;
}

function addPlace() {
  const name = document.getElementById("name").value.trim();
  const desc = document.getElementById("desc").value.trim();

  if (!name) return;

  let data = JSON.parse(localStorage.getItem("azory_places") || "[]");

  data.push({
    id: Date.now(),
    name,
    desc
  });

  localStorage.setItem("azory_places", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";

  render();
}

function deletePlace(id) {
  let data = JSON.parse(localStorage.getItem("azory_places") || "[]");
  data = data.filter(p => p.id !== id);
  localStorage.setItem("azory_places", JSON.stringify(data));
  render();
}

function render() {
  const list = document.getElementById("list");
  let data = JSON.parse(localStorage.getItem("azory_places") || "[]");

  if (data.length === 0) {
    list.innerHTML = "<p class='small'>Brak dodanych miejsc</p>";
    return;
  }

  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div class="place">
        <strong>${p.name}</strong>
        <div class="small">${p.desc || ""}</div>

        <div class="row">
          <button class="secondary" onclick="deletePlace(${p.id})">Usuń</button>
        </div>
      </div>
    `;
  });
}

updateCountdown();
render();
</script>
<script>
async function loadWeather() {
  try {
    const res = await fetch(
      "https://api.open-meteo.com/v1/forecast?latitude=37.74&longitude=-25.67&current=temperature_2m,wind_speed_10m,uv_index,precipitation,cloud_cover"
    );

    const data = await res.json();
    const w = data.current;

    document.getElementById("weather").innerHTML = `
      🌡️ Temperatura: ${w.temperature_2m}°C<br>
      💨 Wiatr: ${w.wind_speed_10m} km/h<br>
      ☁️ Zachmurzenie: ${w.cloud_cover}%<br>
      🌧️ Opady: ${w.precipitation} mm<br>
      ☀️ UV: ${w.uv_index}
    `;
  } catch (e) {
    document.getElementById("weather").innerHTML =
      "❌ Nie udało się pobrać pogody";
  }
}

loadWeather();
</script>
